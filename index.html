<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe API Test</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; padding-top: 100px; }
        button { padding: 30px 60px; font-size: 24px; font-bold: true; cursor: pointer; border-radius: 10px; background: #ff4757; color: white; border: none; }
    </style>
</head>
<body>

    <h1>🚨 API 生存確認テスト 🚨</h1>
    <br><br>
    
    <button id="test-btn">ここを押すと1秒震えるはず！</button>

    <script>
        document.getElementById('test-btn').addEventListener('click', () => {
            if (navigator.vibrate) {
                // 強制的に1秒（1000ミリ秒）震わせる指令
                navigator.vibrate(1000);
                alert("APIの命令は送ったよ！震えた？");
            } else {
                alert("ショック！このブラウザはバイブ機能に完全非対応です。");
            }
        });
    </script>
</body>
</html>
