<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Bass Flash Player</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; padding-top: 30px; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 5px; border: none; background: #00bcd4; color: white; font-weight: bold; }
        #status { margin-top: 20px; color: #aaa; font-size: 14px; }
        video { display: none; }
    </style>
</head>
<body>

    <h1>🎵 Bass Flash Player 🎵</h1>
    
    <audio id="audio" src="BEHIND-THE-MASK.mp3" controls crossorigin="anonymous"></audio>
    <br><br>
    
    <button id="start-btn">アプリを起動してライトを許可</button>
    <div id="status">ステータス: 待機中</div>

    <video id="video" autoplay playsinline></video>

    <script>
        const audio = document.getElementById('audio');
        const startBtn = document.getElementById('start-btn');
        const statusDiv = document.getElementById('status');
        const video = document.getElementById('video');

        let audioContext, analyser, dataArray;
        let videoTrack = null;
        let isRunning = false;

        startBtn.addEventListener('click', async () => {
            if (isRunning) return;
            
            try {
                statusDiv.innerText = "カメラの準備中...（許可ポップアップが出たらOKを押してね）";

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } },
                    audio: false
                });
                
                video.srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];
                
                setupAudio();
                
                statusDiv.innerText = "準備完了！重低音（ビート）に合わせてライトが光るよ！";
                isRunning = true;
                
                updateFlash();
            } catch (err) {
                console.error(err);
                statusDiv.innerText = "エラー: カメラの許可がないか、対応していない機種です。";
            }
        });

        // ② 音楽解析のセットアップ（低音をきれいに切り分ける設定）
        function setupAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaElementSource(audio);
            analyser = audioContext.createAnalyser();
            
            // fftSizeを256にして、音をより細かく分析できるようにしたよ
            analyser.fftSize = 256; 
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            source.connect(analyser);
            analyser.connect(audioContext.destination);
        }

        // ③ ベースの音だけに反応させるメインループ
        async function updateFlash() {
            requestAnimationFrame(updateFlash);

            if (!analyser || !videoTrack) return;

            // 現在の周波数データを取得
            analyser.getByteFrequencyData(dataArray);

            // 【ベース認識！】データの最初の方（インデックス0〜2）が一番低い重低音だよ
            // ここだけを取り出して平均を計算するよ
            const bassVolume = (dataArray[0] + dataArray[1] + dataArray[2]) / 3;

            // 【低音用のしきい値】
            // ビートの「ドン！」って瞬間だけ光るように、ちょっと高めの「110」に設定したよ！
            // もしこれでも光りっぱなしなら130とかに上げて、逆に光らなければ80とかに下げてみてね。
            const threshold = 110; 

            try {
                if (bassVolume > threshold) {
                    await videoTrack.applyConstraints({ advanced: [{ torch: true }] });
                } else {
                    await videoTrack.applyConstraints({ advanced: [{ torch: false }] });
                }
            } catch (e) {
                // エラー回避
            }
        }
    </script>
</body>
</html>
